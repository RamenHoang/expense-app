<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication Successful</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .success-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            background: #10b981;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: scaleIn 0.5s ease-out;
        }

        .success-icon svg {
            width: 48px;
            height: 48px;
            stroke: white;
            stroke-width: 3;
            fill: none;
        }

        @keyframes scaleIn {
            from {
                transform: scale(0);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        h1 {
            color: #1f2937;
            font-size: 28px;
            margin-bottom: 12px;
            font-weight: 700;
        }

        p {
            color: #6b7280;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .status {
            background: #f3f4f6;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 24px;
        }

        .status-text {
            color: #374151;
            font-size: 14px;
            font-weight: 500;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #e5e7eb;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .button {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 14px 32px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            margin-top: 8px;
        }

        .button:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .button:active {
            transform: translateY(0);
        }

        .info {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #e5e7eb;
        }

        .info-text {
            color: #9ca3af;
            font-size: 14px;
        }

        .error {
            background: #fee2e2;
            color: #991b1b;
            padding: 16px;
            border-radius: 12px;
            margin-top: 16px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-icon">
            <svg viewBox="0 0 24 24">
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
        </div>

        <h1>Authentication Successful!</h1>
        <p>You have successfully signed in to your Expense App account.</p>

        <div class="status">
            <div class="status-text">
                <span class="spinner"></span>
                <span id="statusText">Opening app...</span>
            </div>
        </div>

        <button class="button" id="openAppBtn" onclick="openApp()">
            Open Expense App
        </button>

        <div class="info">
            <p class="info-text">
                If the app doesn't open automatically, please click the button above or return to your app manually.
            </p>
        </div>

        <div class="error" id="errorMessage"></div>
    </div>

    <script>
        // Get URL parameters (access_token, refresh_token, etc.)
        const urlParams = new URLSearchParams(window.location.hash.substring(1));
        const accessToken = urlParams.get('access_token');
        const refreshToken = urlParams.get('refresh_token');
        const tokenType = urlParams.get('token_type');
        const expiresIn = urlParams.get('expires_in');
        const authType = urlParams.get('type');

        // App deeplink scheme
        const APP_SCHEME = 'expenseapp://';
        const ANDROID_PACKAGE = 'com.expenseapp.personalfinance';
        const IOS_APP_STORE_ID = ''; // Add your App Store ID when published

        function isIOS() {
            return /iPhone|iPad|iPod/i.test(navigator.userAgent);
        }

        function isAndroid() {
            return /Android/i.test(navigator.userAgent);
        }

        function openApp() {
            const statusText = document.getElementById('statusText');
            const errorMessage = document.getElementById('errorMessage');

            // Build deeplink with auth parameters
            let deeplink = `${APP_SCHEME}auth/callback`;
            
            if (accessToken) {
                deeplink += `?access_token=${encodeURIComponent(accessToken)}`;
                if (refreshToken) {
                    deeplink += `&refresh_token=${encodeURIComponent(refreshToken)}`;
                }
                if (tokenType) {
                    deeplink += `&token_type=${encodeURIComponent(tokenType)}`;
                }
                if (expiresIn) {
                    deeplink += `&expires_in=${encodeURIComponent(expiresIn)}`;
                }
                if (authType) {
                    deeplink += `&type=${encodeURIComponent(authType)}`;
                }
            }

            try {
                if (isAndroid()) {
                    // Android intent fallback
                    const intentUrl = `intent://auth/callback${accessToken ? '?access_token=' + encodeURIComponent(accessToken) + (refreshToken ? '&refresh_token=' + encodeURIComponent(refreshToken) : '') + (authType ? '&type=' + encodeURIComponent(authType) : '') : ''}#Intent;scheme=expenseapp;package=${ANDROID_PACKAGE};end`;
                    window.location.href = intentUrl;
                } else if (isIOS()) {
                    // iOS Universal Links or custom scheme
                    window.location.href = deeplink;
                    
                    // Fallback to App Store if app is not installed
                    if (IOS_APP_STORE_ID) {
                        setTimeout(() => {
                            window.location.href = `https://apps.apple.com/app/id${IOS_APP_STORE_ID}`;
                        }, 2000);
                    }
                } else {
                    // Desktop or other platforms
                    window.location.href = deeplink;
                }

                statusText.innerHTML = '<span class="spinner"></span>App should open shortly...';
                
                // Check if app opened after 3 seconds
                setTimeout(() => {
                    if (document.visibilityState === 'visible') {
                        statusText.textContent = 'Unable to open app automatically';
                        errorMessage.textContent = 'Please make sure the Expense App is installed on your device, then click the "Open Expense App" button.';
                        errorMessage.style.display = 'block';
                    }
                }, 3000);

            } catch (error) {
                console.error('Error opening app:', error);
                statusText.textContent = 'Error opening app';
                errorMessage.textContent = 'An error occurred. Please open the app manually.';
                errorMessage.style.display = 'block';
            }
        }

        // Auto-open app when page loads
        window.addEventListener('load', () => {
            setTimeout(() => {
                openApp();
            }, 500);
        });

        // Handle visibility change to detect if user returned to browser
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') {
                const statusText = document.getElementById('statusText');
                statusText.textContent = 'Returned to browser';
            }
        });
    </script>
</body>
</html>
